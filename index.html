<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imperial Eggs</title>

<style>

body{
background:black;
color:#d4af37;
font-family:Arial;
margin:0;
}

header{
text-align:center;
padding:30px;
border-bottom:1px solid #d4af37;
}

header h1{
font-size:40px;
letter-spacing:3px;
}

nav{
text-align:center;
padding:15px;
border-bottom:1px solid #d4af37;
}

nav a{
color:#d4af37;
margin:15px;
text-decoration:none;
font-weight:bold;
}

.banner{
text-align:center;
padding:40px;
}

.banner img{
max-width:90%;
border:2px solid #d4af37;
border-radius:10px;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#0a0a0a;
border:1px solid #d4af37;
border-radius:10px;
padding:20px;
text-align:center;
}

.card h3{
margin:10px 0;
}

.preco{
font-size:24px;
font-weight:bold;
margin:10px 0;
}

button{
background:#d4af37;
color:black;
border:none;
padding:12px 20px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#b8962e;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid #d4af37;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<h1>IMPERIAL EGGS</h1>
<p>Ovos de Páscoa Luxuosos</p>

</header>

<nav>

<a href="#">Início</a>
<a href="#produtos">Ovos</a>

</nav>

<div class="banner">

<img src="luxury-ovos.png">

</div>

<div class="container">

<h2 style="text-align:center;">Coleção Premium</h2>

<div class="produtos" id="produtos">

<div class="card">
<h3>Ovo Clássico</h3>
<p class="preco">R$29,90</p>
<button>Comprar</button>
</div>

<div class="card">
<h3>Ovo Crocante</h3>
<p class="preco">R$39,90</p>
<button>Comprar</button>
</div>

<div class="card">
<h3>Ovo Brigadeiro</h3>
<p class="preco">R$48,90</p>
<button>Comprar</button>
</div>

<div class="card">
<h3>Ovo Trufado</h3>
<p class="preco">R$69,90</p>
<button>Comprar</button>
</div>

<div class="card">
<h3>Ovo Gourmet</h3>
<p class="preco">R$89,90</p>
<button>Comprar</button>
</div>

<div class="card">
<h3>Ovo Prestige</h3>
<p class="preco">R$99,90</p>
<button>Comprar</button>
</div>

<div class="card">
<h3>Ovo Supremo</h3>
<p class="preco">R$109,00</p>
<button>Comprar</button>
</div>

</div>

</div>

<footer>

<p>© 2026 Imperial Eggs • Chocolate Premium</p>

</footer>

</body>

</html>
